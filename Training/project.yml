name: Training

# ─────────────────────────────────────────────
# Project-wide options
# ─────────────────────────────────────────────
options:
  bundleIdPrefix: com.thead9
  deploymentTarget:
    iOS: "26.0"
  groupSortPosition: none
  createIntermediateGroups: true

# ─────────────────────────────────────────────
# xcconfig files
# Secrets.xcconfig is gitignored — copy Secrets.xcconfig.template
# to Secrets.xcconfig and fill in the real values before building.
# ─────────────────────────────────────────────
configFiles:
  Debug: ../Secrets.xcconfig
  Release: ../Secrets.xcconfig

# ─────────────────────────────────────────────
# Local Swift Packages
# ─────────────────────────────────────────────
packages:
  ThunderCore:
    path: ../ThunderCore
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"

# ─────────────────────────────────────────────
# Project-wide build settings
# ─────────────────────────────────────────────
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

# ─────────────────────────────────────────────
# Targets
# ─────────────────────────────────────────────
targets:
  Training:
    type: application
    platform: iOS
    deploymentTarget: "26.0"

    sources:
      - path: Sources

    dependencies:
      - package: ThunderCore
      - package: RevenueCat
        product: RevenueCat

    # ─────────────────────────────────────────────
    # Entitlements
    # Container identifier must match ThunderConfiguration.cloudKitContainerIdentifier.
    # ─────────────────────────────────────────────
    entitlements:
      path: Sources/Training.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.thead9.thunder
        com.apple.developer.icloud-services:
          - CloudKit

    settings:
      base:
        # Identity
        PRODUCT_NAME: Training
        PRODUCT_BUNDLE_IDENTIFIER: com.thead9.training

        # Swift 6 language mode
        SWIFT_VERSION: "6.0"

        # Deployment
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"

        # Static Info.plist — allows $(REVENUECAT_API_KEY) from xcconfig
        # to be embedded in the bundle at build time.
        INFOPLIST_FILE: Sources/Info.plist

        # Code signing
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
